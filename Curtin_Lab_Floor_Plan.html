* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ee; padding: 20px; }
h1 { font-size: 1.15em; font-weight: 500; margin-bottom: 3px; color: #1a1a1a; }
.sub { font-size: 0.78em; color: #777; margin-bottom: 14px; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; background: #fff; padding: 9px 14px; border-radius: 7px; border: 0.5px solid #ddd; margin-bottom: 14px; }

svg { display: block; max-width: 100%; height: auto; }

.eq { cursor: default; }
.eq:hover rect, .eq:hover circle { filter: brightness(0.88); }
.sm-eq { cursor: pointer; }
.sm-eq rect { fill: #2a4d6e; } /* benchtop — dark navy, distinct from freestanding black */
.sm-eq:hover rect { filter: brightness(1.3); }

#tip {
  position: fixed; background: rgba(12,12,12,0.91); color: #fff;
  padding: 7px 11px; border-radius: 5px; font-size: 0.76em;
  pointer-events: none; opacity: 0; transition: opacity 0.1s;
  z-index: 999; max-width: 240px; line-height: 1.5; display: none;
}
#tip.on { opacity: 1; display: block; }
.tn { font-weight: 500; }
.ts { color: #aaa; font-size: 0.9em; margin-top: 1px; }

#panel { margin-top: 12px; padding: 12px 16px; background: #fff; border-radius: 7px; border: 0.5px solid #ddd; display: none; font-size: 0.82em; }
#panel strong { display: block; margin-bottom: 3px; color: #1a1a1a; }
#panel span { color: #666; }
</style>

<div id="panel">
  <strong id="pn"></strong>
  <span id="ps"></span>
</div>

<div id="tip">
  <div class="tn" id="tn"></div>
  <div class="ts" id="ts"></div>
</div>

<script>
const tip = document.getElementById('tip');
const tn = document.getElementById('tn');
const ts = document.getElementById('ts');

document.querySelectorAll('.eq').forEach(el => {
  el.addEventListener('mouseenter', () => {
    const n = el.dataset.n || el.closest('[data-n]')?.dataset.n || '';
    const s = el.dataset.s || el.closest('[data-s]')?.dataset.s || '';
    tn.textContent = n;
    ts.textContent = s;
    tip.classList.add('on');
  });
  el.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 8)  + 'px';
  });
  el.addEventListener('mouseleave', () => tip.classList.remove('on'));
});

const panel = document.getElementById('panel');
const pn    = document.getElementById('pn');
const ps    = document.getElementById('ps');

document.querySelectorAll('.sm-eq').forEach(el => {
  el.addEventListener('click', () => {
    const id = el.dataset.id;
    const nm = el.dataset.n || '';
    const named = nm && !nm.startsWith('Sm ');
    pn.textContent = named ? nm + '  (' + id + ')' : 'Equipment ' + id;
    ps.textContent = (el.dataset.s || '') + (named ? '' : ' · Identity not yet assigned.');
    panel.style.display = 'block';
  });
});
</script>
